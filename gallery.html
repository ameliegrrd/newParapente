<body class="home-bg gallery-page">
<header>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>

<main>
    <section class="gallery-page-panel">
        <div class="gallery-video-preview">
            <h2>Aperçu vidéo</h2>
            <p>Découvrez un extrait de l'expérience en vol à Méribel.</p>
            <div class="video-frame">
                <iframe
                    src="https://www.youtube.com/embed/l1WNY80ole0?rel=0"
                    title="Vidéo Parapente Méribel"
                    loading="lazy"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen></iframe>
            </div>
        </div>

        <div class="gallery-local-videos">
            <h2>Vidéos en vol</h2>
            <p>Retrouvez aussi nos vidéos panoramiques filmées à Méribel.</p>
            <div class="gallery-video-grid">
                <video class="gallery-local-video" controls preload="auto" playsinline>
                    <source src="images/panoramavideo2.mp4" type="video/mp4">
                    Votre navigateur ne prend pas en charge la vidéo HTML5.
                </video>
                <video class="gallery-local-video" controls preload="auto" playsinline>
                    <source src="images/Panorama_video.mp4" type="video/mp4">
                    Votre navigateur ne prend pas en charge la vidéo HTML5.
                </video>
            </div>
        </div>

        <h1>Galerie photos</h1>
        <div class="gallery-grid">
            <img src="images/lac-meribel.jpg" alt="Passager en vol biplace au-dessus de Méribel" width="1024" height="768" loading="lazy" decoding="async" onclick="openLightbox(this.src, this.alt)">
            <img src="images/burgin-meribel.jpg" alt="Panorama aérien des sommets autour de Méribel" width="1024" height="768" loading="lazy" decoding="async" onclick="openLightbox(this.src, this.alt)">
            <img src="images/plan-tougnette-meribel.jpg" alt="Vue hivernale en parapente au-dessus de Méribel" width="1024" height="768" loading="lazy" decoding="async" onclick="openLightbox(this.src, this.alt)">

            <img src="images/marmot.jpeg" alt="Marmotte sur les hauteurs de Méribel" width="1024" height="768" loading="lazy" decoding="async" onclick="openLightbox(this.src, this.alt)">

    </section>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" type="button" aria-label="Fermer la galerie" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-nav-prev" type="button" aria-label="Image précédente" onclick="onLightboxNavClick('prev', event)">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M14.5 6.5 9 12l5.5 5.5"/></svg>
        </button>
        <button class="lightbox-nav lightbox-nav-next" type="button" aria-label="Image suivante" onclick="onLightboxNavClick('next', event)">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9.5 6.5 15 12l-5.5 5.5"/></svg>
        </button>
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-caption"></div>
    </div>
